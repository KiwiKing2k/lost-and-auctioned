<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auctions</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; }
        .auction-item { border: 1px solid #ccc; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .auction-item h2 { margin-top: 0; }
        .offer-form { margin-top: 15px; }
        input { padding: 8px; margin-right: 10px; }
        button { padding: 8px 12px; }
    </style>
</head>
<body>
    <h1>Active Auctions</h1>
    <div id="auction-list"></div>

    <script>
        const API_BASE_URL = 'http://localhost:8081';

        function loadAuctions() {
            fetch(`${API_BASE_URL}/auctions`)
                .then(response => response.json())
                .then(auctions => {
                    const auctionList = document.getElementById('auction-list');
                    auctionList.innerHTML = '';
                    if (auctions.length === 0) {
                        auctionList.innerHTML = '<p>No active auctions at this time.</p>';
                        return;
                    }
                    auctions.forEach(auction => {
                        const div = document.createElement('div');
                        div.className = 'auction-item';
                        div.innerHTML = `
                            <h2>${auction.denumireObiect}</h2>
                            <p>Place your bid:</p>
                            <form class="offer-form" onsubmit="placeOffer(event, '${auction.denumireObiect}')">
                                <input type="text" name="numeOfertant" placeholder="Your Name" required>
                                <input type="number" name="suma" placeholder="Amount" step="0.01" required>
                                <button type="submit">Place Offer</button>
                            </form>
                        `;
                        auctionList.appendChild(div);
                    });
                });
        }

        function placeOffer(event, denumireObiect) {
            event.preventDefault();
            const form = event.target;
            const oferta = {
                numeOfertant: form.numeOfertant.value,
                suma: parseFloat(form.suma.value)
            };

            fetch(`${API_BASE_URL}/auctions/${denumireObiect}/oferta`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(oferta)
            })
            .then(response => {
                if (response.ok) {
                    alert('Offer placed successfully!');
                    form.reset();
                } else {
                    alert('Failed to place offer.');
                }
            });
        }

        window.onload = loadAuctions;
    </script>
</body>
</html>
